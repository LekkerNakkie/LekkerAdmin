debug: false

invsee:
  enabled: true
  allow-offline: true
  allow-modify: true
  title: "&bInvsee &7• &f{player}"
  rows: 6

  layout:
    slots:
      helmet: 46
      chestplate: 47
      leggings: 48
      boots: 49
      offhand: 53

    label-slots:
      helmet: 37
      chestplate: 38
      leggings: 39
      boots: 40
      offhand: 44

    labels:
      helmet: "&bHelm"
      chestplate: "&bChestplate"
      leggings: "&bLeggings"
      boots: "&bBoots"
      offhand: "&bOffhand"

enderchest:
  enabled: true
  allow-offline: true
  allow-modify: true
  title: "&bEnderchest &7• &f{player}"

leave-tracking:
  enabled: true
  classify-kicks: true
  fallback-quit-reason: "QUIT"

restart:
  timezone: "Europe/Brussels"
  enabled: true

  auto:
    enabled: true
    times:
      - "03:00"
      - "15:00"
    skip-if-planned-running: true
    default-reason: "Automatische restart"

  announce-seconds:
    - 3600
    - 1800
    - 600
    - 300
    - 60
    - 30
    - 10
    - 5
    - 4
    - 3
    - 2
    - 1

  title:
    enabled: true
    fade-in: 10
    stay: 40
    fade-out: 10

  disconnect:
    enabled: true

  action:
    type: "stop"
    command: "stop"

planrestart:
  allow-override: true
  default-reason: "Geen reden opgegeven."

maintenance:
  enabled: false