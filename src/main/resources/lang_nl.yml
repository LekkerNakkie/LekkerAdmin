# =========================================================
#  LekkerAdmin - Nederlandse language file
# =========================================================
# Kleurstijl:
#   &7 = gewone zinsbouw
#   &b = markering / belangrijke waarde
#   &9 = titel / accent
#   &a = succes / aan
#   &c = fout / uit / geweigerd
#
# Placeholders:
#   {player}      = spelernaam
#   {actor}       = uitvoerder / staff
#   {reason}      = reden
#   {duration}    = duur
#   {expires_at}  = vervalt op
#   {remaining}   = resterende tijd
#   {date}        = datum
#   {page}        = huidige pagina
#   {max_page}    = maximum pagina
#   {id}          = punishment id
#   {index}       = index in lijst
#   {status}      = status
#   {time}        = tijd
#   {target-time} = exacte uitvoertijd
#   {server}      = servernaam
# =========================================================

general:
  prefix: "&7[&9LekkerAdmin&7] "

  no-permission: "&cDaar edde gij het lef ni vur.."
  player-only: "&cDit commando kan enkel door spelers gebruikt worden."
  player-not-found: "&cSpeler niet gevonden."
  unknown-error: "&cEr is iets misgelopen."
  reload-only-ingame: "&cDit commando kan enkel in-game gebruikt worden."

# =========================================================
#  Reload
# =========================================================
reload:
  started: "&7Reload gestart..."
  config: "&a✔ &7Config herladen"
  database: "&a✔ &7Database reconnect uitgevoerd"
  discord: "&a✔ &7Discord bot herstart"
  punishments: "&a✔ &7Punishments herladen"
  punishment-cache: "&a✔ &7Punishment cache herladen"
  expirations: "&a✔ &7Expirations opnieuw ingepland"
  logs: "&a✔ &7Logs herladen"
  invsee: "&a✔ &7Invsee herladen"
  restart: "&a✔ &7Restart systeem herladen"
  maintenance: "&a✔ &7Maintenance systeem herladen"
  explosions: "&a✔ &7Explosion logs herladen"
  sessions: "&a✔ &7Offline sessies herladen"
  finished: "&7Reload voltooid in &b{time}ms&7."

