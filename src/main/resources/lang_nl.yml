# =========================================================
# LekkerAdmin - Dutch language file
# =========================================================
# This file contains in-game messages.
# Common placeholder(s): {prefix}, {player}, {reason}, {time}
# =========================================================

general:
  prefix: "&7[&9LekkerAdmin&7]"

  no-permission: "{prefix} &cDaar edde gij het lef ni vur.."
  player-only: "{prefix} &cDit commando kan enkel door spelers gebruikt worden."
  player-not-found: "{prefix} &cSpeler niet gevonden."
  unknown-error: "{prefix} &cEr is iets misgelopen."
  reload-only-ingame: "{prefix} &cDit commando kan enkel in-game gebruikt worden."

# =========================================================
# Reload
# =========================================================
reload:
  started: "{prefix} &7Reload gestart..."
  config: "{prefix} &a✔ &7Config herladen"
  database: "{prefix} &a✔ &7Database reconnect uitgevoerd"
  discord: "{prefix} &a✔ &7Discord bot herstart"
  punishments: "{prefix} &a✔ &7Punishments herladen"
  punishment-cache: "{prefix} &a✔ &7Punishment cache herladen"
  expirations: "{prefix} &a✔ &7Expirations opnieuw ingepland"
  logs: "{prefix} &a✔ &7Logs herladen"
  invsee: "{prefix} &a✔ &7Invsee herladen"
  restart: "{prefix} &a✔ &7Restart systeem herladen"
  maintenance: "{prefix} &a✔ &7Maintenance systeem herladen"
  explosions: "{prefix} &a✔ &7Explosion logs herladen"
  sessions: "{prefix} &a✔ &7Offline sessies herladen"
  finished: "{prefix} &7Reload voltooid in &b{time}ms&7."

# =========================================================
# Main admin command help
# =========================================================
admin:
  help:
    header: "&8&m----------------------------------------"
    title: "&9LekkerAdmin &7- Help"
    help: "&7/la help &8- &bToon help"
    reload: "&7/la reload &8- &bHerlaad plugin"
    punishments: "&7/la punishments &8- &bToon punishment commands"
    tools: "&7/la tools &8- &bToon tools commands"
    footer: "&8&m----------------------------------------"

  tools:
    header: "&8&m----------------------------------------"
    title: "&9LekkerAdmin &7- Tools"
    invsee: "&7/la invsee <speler> &8- &bBekijk inventory van speler"
    enderchest: "&7/enderchest <speler> &8- &bBekijk enderchest van speler"
    planrestart: "&7/planrestart <time> <reden...> &8- &bPlan een restart"
    nextrestart: "&7/nextrestart &8- &bToon de volgende 3 restarts"
    cancelrestart: "&7/cancelrestart [id] &8- &bAnnuleer restart"
    maintenance: "&7/maintenancemode &8- &bToggle maintenance mode"
    whois: "&7/whois <speler> [pagina] &8- &bBekijk spelerinfo"
    vanish: "&7/vanish, /v &8- &bToggle vanish mode"
    footer: "&8&m----------------------------------------"

# =========================================================
# Invsee / Enderchest
# =========================================================
invsee-command:
  player-only: "{prefix} &cAlleen spelers kunnen dit command gebruiken."
  disabled: "{prefix} &cInvsee staat uitgeschakeld."
  usage: "{prefix} &7Gebruik: &b/lekkeradmin invsee <speler>"
  offline-disabled: "{prefix} &cOffline invsee staat uitgeschakeld."
  player-never-joined: "{prefix} &cDie speler bestaat niet of heeft nog nooit gejoint."

enderchest-command:
  player-only: "{prefix} &cAlleen spelers kunnen dit command gebruiken."
  disabled: "{prefix} &cEnderchest bekijken staat uitgeschakeld."
  offline-disabled: "{prefix} &cOffline enderchest bekijken staat uitgeschakeld."
  player-never-joined: "{prefix} &cDie speler bestaat niet of heeft nog nooit gejoint."

# =========================================================
# Maintenance
# =========================================================
maintenance:
  enabled: "{prefix} &7Maintenance mode is nu &aingeschakeld&7."
  disabled: "{prefix} &7Maintenance mode is nu &cuitgeschakeld&7."
  kick-online: "&cServer staat in maintenance mode.\n\n&7Probeer later opnieuw."
  kick-join: "&cServer staat in maintenance mode.\n\n&7Probeer later opnieuw."
  alias-forward-failed: "{prefix} &cKon maintenance command niet uitvoeren."

# =========================================================
# Restart
# =========================================================
restart:
  prefix: "&7[&cRestart&7]"
  chat: "{restart-prefix} &7Server restart over &b{time}&7. Reden: &b{reason}"
  chat-now: "{restart-prefix} &cServer restart nu&7. Reden: &b{reason}"
  title-main: "&7Restart over &b{time}"
  title-sub: "&7Reden: &b{reason}"
  kick-message: "&cServer restart!\n\n&7Reden: &b{reason}\n&7Je kan direct terug joinen."
  planned: "{prefix} &7Restart gepland over &b{time}&7. Reden: &b{reason}"
  cancelled: "{prefix} &7De geplande restart is &cgeannuleerd&7."
  none-running: "{prefix} &cEr is momenteel geen restart gepland."
  already-planned: "{prefix} &cEr is al een restart gepland."
  invalid-time: "{prefix} &cOngeldige tijd."
  usage: "{prefix} &7Gebruik: &b/planrestart <time> <reden...>"
  cancel-invalid-index: "{prefix} &cOngeldige restart index."
  cancel-index-not-found: "{prefix} &cGeen restart gevonden."
  cancelled-auto-once: "{prefix} &7Auto restart werd eenmalig geskipt."

# =========================================================
# Punishments
# =========================================================
punishments:
  common:
    player-not-found: "{prefix} &cSpeler niet gevonden."
    player-name-required: "{prefix} &cJe moet een speler opgeven."
    reason-required: "{prefix} &cJe moet een reden opgeven."
    duration-required: "{prefix} &cJe moet een tijd opgeven."
    already-banned: "{prefix} &cDeze speler is al geband."
    not-banned: "{prefix} &cDeze speler is niet geband."
    already-muted: "{prefix} &cDeze speler is al gemute."
    not-muted: "{prefix} &cDeze speler is niet gemute."

  ban:
    usage: "{prefix} &7Gebruik: &b/ban <speler> <tijd> [reden]"
    invalid-duration: "{prefix} &cOngeldige tijd."
    async-failed: "{prefix} &cFout bij bannen."
    sender-message: "{prefix} &7Speler &b{player} &7is geband."

  mute:
    usage: "{prefix} &7Gebruik: &b/mute <speler> <tijd> [reden]"
    async-failed: "{prefix} &cFout bij muten."

# =========================================================
# Whois
# =========================================================
whois:
  usage: "{prefix} &7Gebruik: &b/whois <speler>"
  disabled: "{prefix} &cWhois staat uit."
  player-not-found: "{prefix} &cSpeler niet gevonden."

# =========================================================
# Vanish
# =========================================================
vanish:
  player-only: "{prefix} &cAlleen spelers."
  no-permission: "{prefix} &cGeen permission."
  disabled-feature: "{prefix} &cVanish uitgeschakeld."
  enabled: "{prefix} &7Vanish &aaan"
  disabled: "{prefix} &7Vanish &cuit"
  restored: "{prefix} &7Vanish hersteld"

# =========================================================
# Freeze
# =========================================================
freeze:
  frozen-chat: "{prefix} &cJe bent gefreezed door staff."
  frozen-chat-reason: "{prefix} &7Reden: &f{reason}"
  frozen-chat-instructions: "{prefix} &7Blijf stilstaan en wacht op een stafflid."
  frozen-bossbar: "&cJe bent gefreezed - wacht op staff"
  unfrozen-chat: "{prefix} &aJe bent niet langer gefreezed."
  player-frozen: "{prefix} &7Speler &b{player} &7is gefreezed."
  player-unfrozen: "{prefix} &7Speler &b{player} &7is unfreezed."
  already-frozen: "{prefix} &cDeze speler is al gefreezed."
  not-frozen: "{prefix} &cDeze speler is niet gefreezed."
  usage-freeze: "{prefix} &7Gebruik: &b/freeze <speler> [reden]"
  usage-unfreeze: "{prefix} &7Gebruik: &b/unfreeze <speler>"
  blocked-command: "{prefix} &cJe kan geen commands gebruiken terwijl je gefreezed bent."
  quit-while-frozen: "{prefix} &cSpeler &b{player} &cheeft de server verlaten tijdens freeze."
  rejoin-still-frozen: "{prefix} &cJe bent nog steeds gefreezed."