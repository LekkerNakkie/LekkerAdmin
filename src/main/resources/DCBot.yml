# =========================================================
# LekkerAdmin - Discord Bot Config
# =========================================================
# Handles:
# - Discord bot connection
# - Whitelist applications
# - Suggestion system
# - Discord-side logging
# - Permission / role restrictions
# =========================================================

# =========================================================
# Bot connection
# =========================================================
bot:
  # Master toggle for the Discord bot.
  enabled: true

  # Discord bot token.
  token: "PASTE_BOT_TOKEN_HERE"

  # Discord guild/server ID.
  guild-id: "000000000000000000"

  status:
    # Rotate the bot status/presence.
    enabled: true

    # Time between status changes.
    interval-seconds: 10

    # Placeholder(s): {online}
    messages:
      - "🌸 Welcome to LekkerAdmin!"
      - "👥 {online} spelers online"

    # Supported values: PLAYING / WATCHING / LISTENING
    type: PLAYING

# =========================================================
# Discord channels
# =========================================================
channels:
  # Staff review channel for whitelist applications.
  review-channel-id: "000000000000000000"

  # General audit/log channel for whitelist actions.
  log-channel-id: "000000000000000000"

# =========================================================
# Discord webhook logging
# =========================================================
webhooks:
  moderation-log:
    # Only needed if you want moderation logging through a webhook.
    enabled: false
    url: ""
    username: "LekkerAdmin Logs"
    avatar-url: ""

# =========================================================
# Database
# =========================================================
database:
  # Supported values: SQLITE / MYSQL
  type: "SQLITE"

  sqlite:
    # Local database file name.
    file: "data.db"

  mysql:
    # External MySQL connection settings.
    host: "localhost"
    port: 3306
    database: "lekkeradmin"
    username: "root"
    password: ""
    ssl: false
    pool-size: 10

# =========================================================
# Whitelist system
# =========================================================
whitelist:
  enabled: true

  # Automatically link Discord <-> Minecraft after approval.
  auto-link-on-approve: true

  # Automatically add to whitelist when the Minecraft name is valid.
  auto-whitelist-on-valid-name: true

  # Require staff review before whitelist finalization.
  require-review-before-whitelist: true

  # Allow the user to fix their Minecraft name after approval if needed.
  allow-name-retry-after-approval: true

  # Maximum number of name correction attempts.
  max-name-retries: 3

  # Notify staff if name validation fails.
  notify-staff-on-name-failure: true

  # Notify player if name validation fails.
  notify-player-on-name-failure: true

  # Use exact case matching for Minecraft names.
  case-sensitive-name-check: false

  # Allow more than one open application per Discord user.
  allow-multiple-open-applications: false

  # Cooldown between whitelist commands/submissions.
  command-cooldown-seconds: 60

  ingame-notify:
    # Notify in-game staff about new applications.
    enabled: true

    # Only players with this permission will receive the message.
    permission: "lekkeradmin.notify.whitelist"

    # Placeholder(s): {discord}, {minecraft}, {application_id}
    message: "&7[&bWhitelist&7] &fNieuwe aanvraag van &b{discord}&f voor &b{minecraft}&f."

    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.7
    pitch: 1.4

  review-thread:
    # Automatically create a Discord thread under the review message.
    enabled: true

    # Placeholder(s): {minecraft}, {discord}, {application_id}
    name-format: "Whitelist • {minecraft}"

# =========================================================
# Validation
# =========================================================
validation:
  minecraft-name:
    enabled: true

    # Standard Minecraft username limits.
    min-length: 3
    max-length: 16

    # Allowed characters for Minecraft names.
    regex: "^[A-Za-z0-9_]+$"

    # Check whether the profile actually exists.
    check-profile-exists: true

# =========================================================
# Whitelist form
# =========================================================
forms:
  whitelist:
    title: "Whitelist aanvraag"

    dm-message:
      # Send a DM entry message with a button to open the form.
      enabled: true
      content:
        - "Welkom bij Sakurahelm!"
        - "Klik op de knop hieronder om je whitelist aanvraag te starten."
      button-text: "Formulier openen"

    confirm-message:
      # Confirmation screen shown before final submit.
      title: "Controleer je aanvraag"
      description:
        - "Lees alles goed na voor je bevestigt."
      confirm-button: "Bevestigen"
      edit-button: "Opnieuw invullen"
      cancel-button: "Annuleren"

    fields:
      # Supported styles: SHORT / PARAGRAPH
      # order controls field order in the modal flow.

      minecraft_name:
        enabled: true
        label: "Minecraft naam"
        style: "SHORT"
        placeholder: "Bijv. LekkerNakkie"
        required: true
        min-length: 3
        max-length: 16
        order: 1

      age:
        enabled: true
        label: "Leeftijd"
        style: "SHORT"
        placeholder: "Bijv. 18"
        required: true
        min-length: 1
        max-length: 3
        order: 2

      motivation:
        enabled: true
        label: "Waarom wil je joinen?"
        style: "PARAGRAPH"
        placeholder: "Leg kort uit waarom je graag wil joinen"
        required: true
        min-length: 10
        max-length: 400
        order: 3

      rules:
        enabled: true
        label: "Heb je de regels gelezen?"
        style: "SHORT"
        placeholder: "Ja / Nee"
        required: true
        min-length: 2
        max-length: 10
        order: 4

# =========================================================
# Name retry modal
# =========================================================
name-retry:
  modal:
    title: "Minecraft naam corrigeren"

    field:
      label: "Juiste Minecraft naam"
      style: "SHORT"
      placeholder: "Bijv. LekkerNakkie"
      required: true
      min-length: 3
      max-length: 16

# =========================================================
# Messages
# =========================================================
messages:
  slash:
    whitelist-started: "Ik heb je een DM gestuurd met je whitelist formulier."
    dm-failed: "Ik kan je geen DM sturen. Zet je privéberichten aan en probeer opnieuw."
    suggest-submitted: "Je suggestie is ingestuurd."
    suggest-disabled: "Suggesties zijn momenteel uitgeschakeld."
    suggest-missing-channel: "Het suggestiekanaal is niet correct ingesteld."
    suggest-invalid-length: "Je suggestie moet tussen {min} en {max} tekens lang zijn."

  dm:
    application-submitted: "Je whitelist aanvraag is doorgestuurd naar staff."
    application-cancelled: "Je aanvraag is geannuleerd."
    application-approved: "Je aanvraag is goedgekeurd! Je bent toegevoegd aan de whitelist."
    application-denied: "Je aanvraag is afgekeurd."
    application-denied-with-reason: "Je aanvraag is afgekeurd. Reden: {reason}"
    invalid-minecraft-name: "De Minecraft naam die je hebt opgegeven klopt niet."
    retry-name-success: "Je naam is correct verwerkt. Je bent nu toegevoegd aan de whitelist."
    retry-name-failed: "Deze naam is nog steeds ongeldig. Probeer opnieuw."
    blocked-open-application: "Je hebt al een lopende aanvraag. Wacht op staff of gebruik je bestaande aanvraag."
    blocked-already-whitelisted: "Je bent al gewhitelist. Je kan geen nieuwe aanvraag indienen."
    blocked-discord-already-linked: "Je Discord account is al gekoppeld aan een Minecraft account. Je kan geen nieuwe aanvraag indienen."
    blocked-minecraft-already-linked: "Deze Minecraft naam is al gekoppeld aan een ander Discord account."
    whitelist-cooldown: "Je moet even wachten voor je opnieuw een whitelist aanvraag kan indienen."
    invalid-form: "Je formulier is ongeldig: {reason}"
    application-not-found: "Applicatie niet gevonden."
    retry-name-processing-failed: "Naamcorrectie mislukt: {reason}"
    invalid-name-retry-sent: "De Minecraft naam is ongeldig of kon niet bevestigd worden. Je hebt een DM gekregen om je naam opnieuw in te vullen."
    retry-name-submitted-to-staff: "Je naam is correct verwerkt. Je whitelist aanvraag is nu doorgestuurd naar staff."
    approval-failed: "Goedkeuring mislukt: {reason}"
    finalization-failed-after-retry: "Naam werd aangepast, maar finalisatie mislukte: {reason}"

  staff:
    review-title: "Nieuwe whitelist aanvraag"
    approved: "Aanvraag goedgekeurd."
    denied: "Aanvraag afgekeurd."
    pending-name-fix: "Aanvraag goedgekeurd, maar Minecraft naam is ongeldig."
    retry-processed: "Naamcorrectie succesvol verwerkt."
    review-no-permission: "Je hebt geen permissie om aanvragen te reviewen."
    whitelist-failed: "Whitelist mislukt: {reason}"
    application-not-found: "Applicatie niet gevonden."
    pending-name-fix-with-reason: "Applicatie goedgekeurd, maar naamcorrectie is nodig: {reason}"

# =========================================================
# Discord buttons
# =========================================================
buttons:
  # Supported styles: PRIMARY / SUCCESS / DANGER / SECONDARY

  open-form:
    text: "Formulier openen"
    style: "PRIMARY"

  approve:
    text: "Goedkeuren"
    style: "SUCCESS"

  approve-reason:
    text: "Goedkeuren met reden"
    style: "SUCCESS"

  deny:
    text: "Afkeuren"
    style: "DANGER"

  deny-reason:
    text: "Afkeuren met reden"
    style: "DANGER"

  retry-name:
    text: "Naam opnieuw ingeven"
    style: "PRIMARY"

# =========================================================
# Embeds
# =========================================================
embeds:
  colors:
    review: "#00C8FF"
    approved: "#33CC66"
    denied: "#FF4D4D"
    pending-fix: "#FFB347"
    log: "#7289DA"

  texts:
    whitelist-start:
      title: "Whitelist Aanvraag"
      description: "Welkom bij Sakurahelm!\nKlik op de knop hieronder om je whitelist aanvraag te starten."
      footer: ""

    submitted:
      title: "Whitelist Aanvraag Verzonden"
      description: "Je aanvraag is succesvol doorgestuurd naar staff."
      footer: ""

    approved:
      title: "Whitelist Toegelaten"
      description: "Je aanvraag is goedgekeurd! Je bent toegevoegd aan de whitelist.\nJe kan de server joinen via het IP: **play.sakurahelm.com**"
      footer: ""

    denied:
      title: "Whitelist Geweigerd"
      description: "Je aanvraag is afgekeurd."
      footer: ""

    invalid-name:
      title: "Minecraft naam ongeldig"
      description: "De Minecraft naam die je hebt opgegeven klopt niet."
      footer: ""

    review:
      title: "Nieuwe whitelist aanvraag"
      description: ""
      footer: ""

  fields:
    # Reusable embed field names.
    reason: "Reden"
    minecraft-name: "Minecraft naam"
    discord: "Discord"
    reviewer: "Reviewer"
    problem: "Probleem"

# =========================================================
# Logging
# =========================================================
logging:
  webhook:
    # Enable whitelist-related webhook logs.
    enabled: false
    log-approvals: true
    log-denials: true
    log-name-failures: true
    log-name-retries: true
    log-auto-completions: true

  formats:
    # Placeholder(s):
    # {reviewer}, {application_id}, {discord_user}, {minecraft_name},
    # {reason}, {old_name}, {new_name}

    approval: "{reviewer} keurde aanvraag {application_id} goed voor {discord_user} / {minecraft_name}"
    denial: "{reviewer} keurde aanvraag {application_id} af voor {discord_user} / {minecraft_name}. Reden: {reason}"
    invalid-name: "Naam validatie mislukt voor aanvraag {application_id}. Ingegeven naam: {minecraft_name}"
    retry-success: "Naamcorrectie succesvol voor aanvraag {application_id}. Oude naam: {old_name}, nieuwe naam: {new_name}"

# =========================================================
# Discord roles / permissions
# =========================================================
roles:
  # Empty = anyone with access to the buttons/modals can review.
  review-role-ids: []

  give-on-approve:
    # Automatically give a Discord role after approval.
    enabled: false
    role-id: ""

# =========================================================
# /playerinfo Discord permission rules
# =========================================================
playerinfo:
  # Restrict the Discord /playerinfo command to these roles/users.
  allowed-role-ids:
    - ""

  allowed-user-ids:
    - ""

# =========================================================
# Suggestions
# =========================================================
suggestions:
  enabled: true

  # Public suggestion channel.
  channel-id: ""

  # Staff log/review channel.
  log-channel-id: ""

  limits:
    min-length: 5
    max-length: 500

  voting:
    # Community vote reactions.
    upvote-emoji: "👍"
    downvote-emoji: "👎"
    prevent-double-vote: true

  review:
    # Staff review reactions.
    enabled: true
    approve-emoji: "🟢"
    deny-emoji: "🔴"

    # Only these roles may review suggestions.
    allowed-role-ids:
      - ""

  embed:
    title: "Nieuwe suggestie"
    log-title: "Nieuwe suggestie • Staff review"
    footer: "Sakurahelm Suggesties"

    color-pending: "#F1C40F"
    color-approved: "#2ECC71"
    color-denied: "#E74C3C"

    status:
      pending: "In behandeling"
      approved: "Goedgekeurd"
      denied: "Afgekeurd"

    fields:
      submitter: "Ingestuurd door"
      status: "Status"
      reviewer: "Beoordeeld door"

# =========================================================
# Expiry settings
# =========================================================
expiry:
  # Auto-expire unfinished applications after X hours.
  application-hours: 24

  # Auto-expire name retry windows after X hours.
  retry-name-hours: 24