    webhook:
      url: ""
      username: "Drop Logs"
      avatar-url: ""

    filters:
      ignored-worlds: []
      ignored-materials: []
      only-log-if-enchanted: false
      min-amount: 1
      split-large-item-lists: true
      max-items-shown: 12
      deduplicate-death-drops: true

    embed:
      title: "Player Drop"
      description: "{player} dropte item(s)."
      color: "#3498DB"
      footer: "LekkerAdmin • Drops"
      use-timestamp: true
      show-player-head-thumbnail: true
      show-enchantments: true
      show-lore: false
      show-world: true
      show-coordinates: true
      max-field-length: 1024

      fields:
