# =========================================================
# LekkerAdmin - Logs Config
# =========================================================
# Controls Discord logging for:
# - Drops / pickups / deaths
# - Joins / leaves
# - Invsee / Enderchest sessions
# - Punishments / history clears
# - Explosions
# - Vanish / Freeze
# - Creative item actions
# =========================================================

enabled: true
timezone: "Europe/Brussels"
debug: false

# =========================================================
# Global defaults
# =========================================================
defaults:
  # Global embed / delivery behaviour.
  use-embeds: true

  # Supported values: BOT, WEBHOOK, BOTH, NONE
  delivery-mode: "BOT"

  # Formatting / content limits.
  split-large-item-lists: true
  max-items-shown: 12
  max-field-length: 1024

  # Extra item/world details in logs.
  show-enchantments: true
  show-lore: false
  show-world: true
  show-coordinates: true
  show-timestamp: true
  show-player-head-thumbnail: true

  # Item filters.
  only-log-if-enchanted: false
  min-amount: 1
  deduplicate-death-drops: true

  ignored-worlds: []
  ignored-materials: []

  aggregation:
    # Combine rapid item events into grouped logs.
    enabled: true
    flush-after-ticks: 40
    track-destruction: true
    track-pickups: true
    include-destroyed-items: true

  bot:
    # Default bot channel if a section does not override it.
    channel-id: ""

  webhook:
    # Default webhook if a section does not override it.
    url: ""
    username: "LekkerAdmin Logs"
    avatar-url: ""

  embed:
    color: "#5865F2"
    footer: "LekkerAdmin Logs"
    use-timestamp: true

    # Default reusable field names.
    fields:
      player: "Speler"
      actor: "Staff"
      source: "Actie"
      world: "Wereld"
      coordinates: "Coördinaten"
      item: "Items"
      amount: "Aantal"
      item-name: "Item naam"
      enchantments: "Enchantments"
      cause: "Doodsoorzaak"
      killer: "Killer"
      dropped-items: "Gedropte items"
      pickup-type: "Pickup type"
      drop-type: "Drop type"
      xp: "XP"
      keep-inventory: "KeepInventory"
      reason: "Reden"
      health: "Health"
      food: "Food"
      gamemode: "Gamemode"

# =========================================================
# Individual log modules
# =========================================================
logs:

