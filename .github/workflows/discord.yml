name: Discord Updates

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send embed to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          python3 - <<'PY' > payload.json
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              # 🔥 Custom webhook identity
              "username": "LekkerAdmin",
              "avatar_url": "https://imgur.com/a/BBZ21Cc",

              "embeds": [
                  {
                      "title": "🚀 Nieuwe GitHub Update",
                      "description": f"**{os.environ.get('REPOSITORY', 'Onbekende repo')}**",
                      "color": 3447003,

                      # 👇 Extra stijl (icon + label)
                      "author": {
                          "name": "GitHub Push",
                          "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                      },

                      "fields": [
                          {
                              "name": "👤 Auteur",
                              "value": os.environ.get("ACTOR", "Onbekend"),
                              "inline": True
                          },
                          {
                              "name": "🌿 Branch",
                              "value": os.environ.get("BRANCH", "Onbekend"),
                              "inline": True
                          },
                          {
                              "name": "💬 Commit",
                              "value": (os.environ.get("COMMIT_MESSAGE") or "Geen commit message")[:1024]
                          }
                      ],

                      "url": os.environ.get("COMMIT_URL", ""),

                      "footer": {
                          "text": "Sakurahelm Dev Logs"
                      },

                      "timestamp": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
                  }
              ]
          }

          print(json.dumps(payload))
          PY

          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d @payload.json \
            "$DISCORD_WEBHOOK"
